name: chefvision
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+16

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_image_labeling: ^0.14.2
  purchases_flutter: ^9.16.1
  firebase_core: ^4.6.0
  firebase_vertexai: ^2.2.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.8
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  google_mobile_ads: ^7.0.0
  envied: ^1.0.0
  firebase_crashlytics: ^5.1.0
  firebase_remote_config: ^6.3.0
  firebase_analytics: ^12.2.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  json_annotation: ^4.11.0
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  easy_localization: ^3.0.8
  go_router: ^17.2.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  envied_generator: ^1.0.0
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.1

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/logo/
    - assets/translations/


flutter_gen:
  output: lib/resources/gen
  line_length: 120
  integrations:
    flutter_svg: true
